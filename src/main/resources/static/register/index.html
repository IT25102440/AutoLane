<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/png" href="/icns/favicon.png"/>
    <title>AutoLane — Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <style>
        body {
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .register-card {
            width: 100%;
            max-width: 440px;
            background: #161616;
            border: 1px solid var(--border);
            padding: 2.5rem;
        }

        .field-hint {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.35rem;
        }
        .field-hint.error { color: var(--error); }
    </style>
</head>
<body>

<div id="navbar-root" data-mode="auth"></div>

<div class="page-center">
    <div class="register-card">

        <div class="card-eyebrow">Create Account</div>
        <div class="card-title">Start Selling</div>
        <div class="card-sub">Register as a seller to list your cars on AutoLane.</div>

        <div class="alert-msg error" id="errorMsg"></div>
        <div class="alert-msg success" id="successMsg"></div>

        <div class="field-wrap">
            <label for="name">Full Name</label>
            <input
                    type="text"
                    id="name"
                    placeholder="John Silva"
                    autocomplete="name"
                    required
            />
        </div>

        <div class="field-wrap">
            <label for="email">Email Address</label>
            <input
                    type="email"
                    id="email"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
            />
        </div>

        <div class="field-wrap">
            <label for="password">Password</label>
            <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    autocomplete="new-password"
                    required
            />
            <div class="field-hint" id="passwordHint">Minimum 6 characters.</div>
        </div>

        <div class="field-wrap">
            <label for="confirmPassword">Confirm Password</label>
            <input
                    type="password"
                    id="confirmPassword"
                    placeholder="••••••••"
                    autocomplete="new-password"
                    required
            />
            <div class="field-hint" id="confirmHint"></div>
        </div>

        <button class="submit-btn" id="registerBtn" onclick="handleRegister()">
            Create Account →
        </button>

        <div class="card-footer-link">
            Already have an account? <a href="/login">Log in</a>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 AutoLane | WD.08.1.149</p>
</footer>

<script src="/js/auth.js"></script>
<script src="/js/navbar.js"></script>
<script>
    document.getElementById('confirmPassword').addEventListener('input', () => {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const hint = document.getElementById('confirmHint');

        if (confirm.length === 0) {
            hint.textContent = '';
            hint.className = 'field-hint';
        } else if (password !== confirm) {
            hint.textContent = 'Passwords do not match.';
            hint.className = 'field-hint error';
        } else {
            hint.textContent = '✓ Passwords match.';
            hint.className = 'field-hint';
            hint.style.color = '#47ff8a';
        }
    });

    async function handleRegister() {
        const btn = document.getElementById('registerBtn');
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (!name || !email || !password || !confirm) {
            showError('Please fill in all fields.');
            return;
        }

        if (password.length < 6) {
            showError('Password must be at least 6 characters.');
            return;
        }

        if (password !== confirm) {
            showError('Passwords do not match.');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Creating account...';
        hideMessages();

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ name, email, password })
            });

            if (res.ok) {
                showSuccess('Account created! Redirecting to login...');
                btn.textContent = 'Done ✓';
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);

            } else {
                let message = 'Registration failed. Please try again.';
                try {
                    const data = await res.json();
                    if (data.message) message = data.message;
                } catch (_) {}

                showError(message);
                btn.disabled = false;
                btn.textContent = 'Create Account →';
            }

        } catch (err) {
            showError('Could not connect to server. Is the backend running?');
            btn.disabled = false;
            btn.textContent = 'Create Account →';
        }
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.add('show');
        document.getElementById('successMsg').classList.remove('show');
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.classList.add('show');
        document.getElementById('errorMsg').classList.remove('show');
    }

    function hideMessages() {
        document.getElementById('errorMsg').classList.remove('show');
        document.getElementById('successMsg').classList.remove('show');
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleRegister();
    });
</script>

</body>
</html>
