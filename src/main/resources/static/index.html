<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/png" href="/icns/favicon.png"/>
    <title>AutoLane - Second-Hand Cars</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <style>
        /* hero */
        .hero {
            padding: 5rem 2rem 3rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: 'DRIVE';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18vw;
            color: rgba(255,255,255,0.03);
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
        }
        .hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3rem, 8vw, 7rem);
            line-height: 0.95;
            letter-spacing: 2px;
            position: relative;
        }
        .hero h1 em { font-style: normal; color: var(--accent); }
        .hero p {
            color: var(--muted);
            font-size: 1rem;
            margin-top: 1rem;
            font-weight: 300;
            position: relative;
        }

        /* search bar */
        .search-wrap {
            max-width: 560px;
            margin: 2.5rem auto 0;
            display: flex;
            gap: 0;
            position: relative;
        }
        .search-wrap input {
            flex: 1;
            background: var(--grey);
            border: 1px solid var(--border);
            border-right: none;
            color: var(--white);
            padding: 0.85rem 1.2rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-wrap input:focus { border-color: var(--accent); }
        .search-wrap input::placeholder { color: var(--muted); }
        .search-wrap button {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: var(--black);
            padding: 0.85rem 1.5rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .search-wrap button:hover { background: transparent; color: var(--accent); }
        .search-wrap select {
            background: var(--grey);
            border: 1px solid var(--border);
            border-right: none;
            color: var(--white);
            padding: 0.85rem 1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            appearance: none;
            min-width: 160px;
        }
        .search-wrap select:focus { border-color: var(--accent); }
        .search-wrap select option { background: var(--grey); }

        /* filters */
        .filter-strip {
            display: flex;
            align-items: flex-end;
            gap: 1.5rem;
            padding: 0 2rem 1.75rem;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.3rem; }
        .filter-label {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
        }
        .filter-input {
            background: var(--grey);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 0.5rem 0.7rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
            width: 90px;
        }
        .filter-input:focus { border-color: var(--accent); }
        .filter-input::placeholder { color: var(--muted); }
        .filter-input[type=number]::-webkit-inner-spin-button,
        .filter-input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
        .filter-input[type=number] { -moz-appearance: textfield; }
        .filter-range { display: flex; }
        .filter-range .filter-input:first-child { border-right: none; }
        .filter-select { width: auto; min-width: 148px; cursor: pointer; appearance: none; }
        .filter-select option { background: var(--grey); }
        .filter-clear {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 0.5rem 1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-clear:hover { border-color: var(--accent); color: var(--accent); }

        /* section label */
        .section-label {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 2.5rem 2rem 1.5rem;
        }
        .section-label h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }
        .section-label .count {
            background: var(--accent);
            color: var(--black);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            letter-spacing: 1px;
        }
        .divider { flex: 1; height: 1px; background: var(--border); }

        /* car grid */
        .car-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 2rem 2rem 4rem;
        }

        /* car card */
        .car-card {
            background: var(--card-bg);
            cursor: pointer;
            transition: background 0.2s;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .car-card:hover { background: #1e1e1e; }
        .car-card:hover .card-arrow { transform: translateX(4px); }
        .car-card-img {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            display: block;
            filter: grayscale(20%);
            transition: filter 0.3s;
        }
        .car-card:hover .car-card-img { filter: grayscale(0%); }
        .car-card-img-placeholder {
            width: 100%;
            aspect-ratio: 16/10;
            background: var(--grey);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 2rem;
        }
        .car-card-body {
            padding: 1.2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .car-card-brand {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .car-card-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
            line-height: 1.1;
            margin-bottom: 0.8rem;
        }
        .car-card-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 1rem;
        }
        .car-card-meta span::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--muted);
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }
        .car-card-meta span:first-child::before { display: none; }
        .car-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }
        .car-card-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 0.5px;
            color: var(--white);
        }
        .card-arrow { font-size: 1.2rem; color: var(--accent); transition: transform 0.2s; }
    </style>
</head>
<body>

<div id="navbar-root" data-mode="public"></div>

<!-- HERO -->
<section class="hero">
    <h1>Find Your<br/><em>Next Drive</em></h1>
    <p>Browse hundreds of verified second-hand cars listed by real sellers.</p>
    <div class="search-wrap">
        <input type="text" id="searchBrand" placeholder="Brand — Toyota, Honda, BMW..." />
        <select id="searchLocation"></select>
        <button onclick="searchCars()">Search</button>
    </div>
</section>

<!-- LISTINGS -->
<div class="section-label">
    <h2>All Listings</h2>
    <span class="count" id="carCount">0</span>
    <div class="divider"></div>
</div>

<!-- FILTER STRIP -->
<div class="filter-strip">
    <div class="filter-group">
        <div class="filter-label">District</div>
        <select class="filter-input filter-select" id="fDistrict"></select>
    </div>
    <div class="filter-group">
        <div class="filter-label">Price (Rs.)</div>
        <div class="filter-range">
            <input type="number" class="filter-input" id="fPriceMin" placeholder="Min">
            <input type="number" class="filter-input" id="fPriceMax" placeholder="Max">
        </div>
    </div>
    <div class="filter-group">
        <div class="filter-label">Year</div>
        <div class="filter-range">
            <input type="number" class="filter-input" id="fYearFrom" placeholder="From">
            <input type="number" class="filter-input" id="fYearTo" placeholder="To">
        </div>
    </div>
    <button class="filter-clear" id="clearFilters">Clear</button>
</div>

<div class="car-grid" id="carGrid"></div>

<div id="loadingState" class="state-wrap">
    <span class="state-icon">⏳</span>
    <p>Loading listings...</p>
</div>
<div id="emptyState" class="state-wrap" style="display:none;">
    <span class="state-icon">🚗</span>
    <p>No cars found. Try a different search.</p>
</div>

<div class="toast-bar" id="toastBar"></div>

<footer>
    <p>© 2026 AutoLane | WD.08.1.149</p>
</footer>

<script src="/js/auth.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/utils.js"></script>
<script>
    let allCars = [];

    document.addEventListener('DOMContentLoaded', () => {
        populateDistricts('searchLocation');
        populateDistricts('fDistrict');
        loadCars('/api/cars');

        document.getElementById('searchBrand').addEventListener('keydown', e => {
            if (e.key === 'Enter') searchCars();
        });
        document.getElementById('searchLocation').addEventListener('change', () => {
            searchCars();
        });

        ['fPriceMin', 'fPriceMax', 'fYearFrom', 'fYearTo'].forEach(id => {
            document.getElementById(id).addEventListener('input', applyFilters);
        });
        document.getElementById('fDistrict').addEventListener('change', applyFilters);
        document.getElementById('clearFilters').addEventListener('click', () => {
            ['fDistrict', 'fPriceMin', 'fPriceMax', 'fYearFrom', 'fYearTo'].forEach(id => {
                document.getElementById(id).value = '';
            });
            applyFilters();
        });
    });

    async function loadCars(url) {
        const loading = document.getElementById('loadingState');
        const empty   = document.getElementById('emptyState');
        const grid    = document.getElementById('carGrid');

        grid.innerHTML = '';
        loading.style.display = 'block';
        empty.style.display   = 'none';

        try {
            const res = await fetch(url, { credentials: 'include' });
            if (!res.ok) throw new Error('Failed to load listings');
            allCars = await res.json();
            loading.style.display = 'none';
            applyFilters();
        } catch (err) {
            loading.style.display = 'none';
            showToast('Could not connect to server. Is the backend running?');
        }
    }

    function applyFilters() {
        const district = document.getElementById('fDistrict').value;
        const priceMin = parseFloat(document.getElementById('fPriceMin').value) || 0;
        const priceMax = parseFloat(document.getElementById('fPriceMax').value) || Infinity;
        const yearFrom = parseInt(document.getElementById('fYearFrom').value)   || 0;
        const yearTo   = parseInt(document.getElementById('fYearTo').value)     || 9999;

        const filtered = allCars.filter(car => {
            if (district && car.location !== district) return false;
            if (car.price < priceMin || car.price > priceMax) return false;
            if (car.year  < yearFrom || car.year  > yearTo)   return false;
            return true;
        });

        renderCars(filtered);
    }

    function renderCars(cars) {
        const grid  = document.getElementById('carGrid');
        const empty = document.getElementById('emptyState');

        grid.innerHTML = '';
        document.getElementById('carCount').textContent = cars.length;

        if (cars.length === 0) {
            empty.style.display = 'block';
        } else {
            empty.style.display = 'none';
            cars.forEach(car => grid.appendChild(buildCard(car)));
        }
    }

    function buildCard(car) {
        const card = document.createElement('div');
        card.className = 'car-card';
        card.onclick = () => window.location.href = `/car-detail?id=${car.id}`;

        const imgHtml = car.imagePath
            ? `<img class="car-card-img" src="/uploads/${car.imagePath}" alt="${car.brand} ${car.model}" onerror="this.parentElement.innerHTML='<div class=\\'car-card-img-placeholder\\'>🚗</div>'">`
            : `<div class="car-card-img-placeholder">🚗</div>`;

        const price   = Number(car.price).toLocaleString('en-US');
        const mileage = Number(car.mileage).toLocaleString('en-US');

        card.innerHTML = `
        ${imgHtml}
        <div class="car-card-body">
          <div class="car-card-brand">${car.brand}</div>
          <div class="car-card-title">${car.brand} ${car.model}</div>
          <div class="car-card-meta">
            <span>${car.year}</span>
            <span>${mileage} km</span>
            ${car.location ? `<span>${car.location}</span>` : ''}
          </div>
          <div class="car-card-footer">
            <div class="car-card-price">Rs. ${price}</div>
            <span class="card-arrow">→</span>
          </div>
        </div>
      `;
        return card;
    }

    function searchCars() {
        const brand    = document.getElementById('searchBrand').value.trim();
        const location = document.getElementById('searchLocation').value;

        const params = new URLSearchParams();
        if (brand)    params.append('brand', brand);
        if (location) params.append('location', location);

        const query = params.toString();
        loadCars(query ? `/api/cars/search?${query}` : '/api/cars');
    }

    function showToast(msg) {
        const toast = document.getElementById('toastBar');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);
    }
</script>

</body>
</html>
