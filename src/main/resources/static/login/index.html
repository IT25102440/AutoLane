<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/png" href="/icns/favicon.png"/>
    <title>AutoLane — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <style>
        body {
            display: grid;
            grid-template-rows: auto 1fr auto;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #161616;
            border: 1px solid var(--border);
            padding: 2.5rem;
        }

        .error-msg {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            display: none;
        }
        .error-msg.show { display: block; }
    </style>
</head>
<body>

<div id="navbar-root" data-mode="auth"></div>

<div class="page-center">
    <div class="login-card">

        <div class="card-eyebrow">Seller & Admin</div>
        <div class="card-title">Welcome Back</div>
        <div class="card-sub">Log in to manage your listings.</div>

        <div class="error-msg" id="errorMsg">
            Invalid email or password. Please try again.
        </div>

        <div class="field-wrap">
            <label for="username">Email Address</label>
            <input
                    type="email"
                    id="username"
                    name="username"
                    placeholder="you@example.com"
                    autocomplete="email"
                    required
            />
        </div>

        <div class="field-wrap">
            <label for="password">Password</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
            />
        </div>

        <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
            Log In →
        </button>

        <div class="card-footer-link">
            Don't have an account? <a href="/register">Register as a Seller</a>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 AutoLane | WD.08.1.149</p>
</footer>

<script src="/js/auth.js"></script>
<script src="/js/navbar.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await fetch('/api/auth/me', { credentials: 'include' });
            if (res.ok) {
                const user = await res.json();
                redirectByRole(user.role);
            }
        } catch (err) {}
    });

    async function handleLogin() {
        const btn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const email = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            showError('Please enter your email and password.');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Logging in...';
        errorMsg.classList.remove('show');

        try {
            // Spring Security expects form-encoded body, not JSON
            const formData = new URLSearchParams();
            formData.append('username', email);
            formData.append('password', password);

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString(),
                credentials: 'include'
            });

            if (res.ok) {
                const meRes = await fetch('/api/auth/me', { credentials: 'include' });
                if (meRes.ok) {
                    const user = await meRes.json();
                    redirectByRole(user.role);
                } else {
                    showError('Login succeeded but could not load user info. Try refreshing.');
                    btn.disabled = false;
                    btn.textContent = 'Log In →';
                }
            } else {
                showError('Invalid email or password. Please try again.');
                btn.disabled = false;
                btn.textContent = 'Log In →';
            }

        } catch (err) {
            showError('Could not connect to server. Is the backend running?');
            btn.disabled = false;
            btn.textContent = 'Log In →';
        }
    }

    function redirectByRole(role) {
        if (role === 'ADMIN') {
            window.location.href = '/admin-dashboard';
        } else if (role === 'SELLER') {
            window.location.href = '/seller-dashboard';
        } else {
            window.location.href = '/';
        }
    }

    function showError(msg) {
        const errorMsg = document.getElementById('errorMsg');
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>
