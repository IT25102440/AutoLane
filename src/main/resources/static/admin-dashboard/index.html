<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/png" href="/icns/favicon.png"/>
    <title>AutoLane — Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <style>
        /* admin overrides */
        .profile-avatar-lg { background: var(--admin); }
        .profile-role-tag { color: var(--admin); }
        .stat-box .stat-value.orange { color: var(--admin); }

        .page-header-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            color: var(--muted);
            text-align: right;
        }

        /* tabs */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 1rem 1.5rem 1rem 0;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab-btn.active { color: var(--white); border-bottom-color: var(--accent); }
        .tab-btn:hover:not(.active) { color: var(--white); }
        .tab-panel { display: none; padding: 2rem; }
        .tab-panel.active { display: block; }

        /* section label */
        .section-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        /* car row */
        .car-row {
            display: grid;
            grid-template-columns: 70px 1fr auto;
            gap: 1rem;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.85rem 1rem;
            margin-bottom: 1px;
            transition: background 0.2s;
        }
        .car-row:hover { background: #1a1a1a; }
        .car-thumb {
            width: 70px;
            height: 48px;
            object-fit: cover;
            display: block;
            background: var(--grey);
        }
        .car-thumb-placeholder {
            width: 70px;
            height: 48px;
            background: var(--grey);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--border);
        }
        .car-info .car-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.5px; line-height: 1.1; }
        .car-info .car-meta { font-size: 0.78rem; color: var(--muted); margin-top: 0.15rem; }
        .car-info .car-seller { font-size: 0.78rem; color: var(--admin); margin-top: 0.1rem; }

        /* seller row */
        .seller-row {
            display: grid;
            grid-template-columns: 44px 1fr auto;
            gap: 1rem;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1rem;
            margin-bottom: 1px;
            transition: background 0.2s;
        }
        .seller-row:hover { background: #1a1a1a; }
        .seller-avatar {
            width: 44px;
            height: 44px;
            background: var(--grey);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            color: var(--accent);
            flex-shrink: 0;
        }
        .seller-info .seller-name { font-weight: 600; font-size: 0.95rem; }
        .seller-info .seller-email { font-size: 0.8rem; color: var(--muted); margin-top: 0.1rem; }
        .seller-info .seller-count { font-size: 0.75rem; color: var(--admin); margin-top: 0.1rem; }

        /* delete button */
        .del-btn {
            border: 1px solid transparent;
            background: transparent;
            color: var(--muted);
            padding: 0.35rem 0.8rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .del-btn:hover { border-color: var(--error); color: var(--error); }

        .state-wrap { padding: 4rem 2rem; }
        .state-wrap .state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    </style>
</head>
<body>

<div id="navbar-root" data-mode="admin-nav"></div>

<div class="page-header">
    <div class="profile-block">
        <div class="profile-avatar-lg" id="profileAvatar">?</div>
        <div>
            <div class="profile-role-tag">Admin Account</div>
            <div class="profile-name-lg" id="profileName">Loading...</div>
            <div class="profile-email-lg" id="profileEmail"></div>
        </div>
    </div>
    <div class="page-header-label">Control Centre</div>
</div>

<div class="stats-row">
    <div class="stat-box">
        <div class="stat-label">Total Cars</div>
        <div class="stat-value" id="statCars">—</div>
    </div>
    <div class="stat-box">
        <div class="stat-label">Total Sellers</div>
        <div class="stat-value orange" id="statSellers">—</div>
    </div>
</div>

<div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('cars', this)">All Cars</button>
    <button class="tab-btn" onclick="switchTab('sellers', this)">All Sellers</button>
</div>

<div class="tab-panel active" id="tab-cars">
    <div class="section-label">All Listings</div>
    <div id="carsLoading" class="state-wrap">
        <span class="state-icon">⏳</span>
        <p>Loading listings...</p>
    </div>
    <div id="carsEmpty" class="state-wrap" style="display:none;">
        <span class="state-icon">🚗</span>
        <p>No car listings found.</p>
    </div>
    <div id="carsList"></div>
</div>

<div class="tab-panel" id="tab-sellers">
    <div class="section-label">Registered Sellers</div>
    <div id="sellersLoading" class="state-wrap">
        <span class="state-icon">⏳</span>
        <p>Loading sellers...</p>
    </div>
    <div id="sellersEmpty" class="state-wrap" style="display:none;">
        <span class="state-icon">👤</span>
        <p>No sellers registered yet.</p>
    </div>
    <div id="sellersList"></div>
</div>

<div class="modal-overlay" id="deleteModal">
    <div class="modal-box">
        <h3 id="modalTitle">Confirm Delete</h3>
        <p id="modalMessage">This action cannot be undone.</p>
        <div class="modal-actions">
            <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
            <button class="modal-btn confirm" id="confirmDeleteBtn">Delete</button>
        </div>
    </div>
</div>

<div class="toast-bar" id="toastBar"></div>

<footer>
    <p>© 2026 AutoLane | WD.08.1.149</p>
</footer>

<script src="/js/auth.js"></script>
<script src="/js/navbar.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const user = await requireRole('ADMIN', { wrongRoleUrl: '/seller-dashboard' });
        if (!user) return;

        document.getElementById('profileAvatar').textContent = user.name.charAt(0).toUpperCase();
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileEmail').textContent = user.email;

        await Promise.all([loadCars(), loadSellers()]);
    });

    async function loadCars() {
        try {
            const res = await fetch('/api/admin/cars', { credentials: 'include' });
            if (!res.ok) throw new Error();

            const cars = await res.json();
            document.getElementById('carsLoading').style.display = 'none';
            document.getElementById('statCars').textContent = cars.length;

            if (cars.length === 0) {
                document.getElementById('carsEmpty').style.display = 'block';
                return;
            }

            renderCars(cars);

        } catch (err) {
            document.getElementById('carsLoading').style.display = 'none';
            showToast('Could not load car listings.', 'error');
        }
    }

    function renderCars(cars) {
        const list = document.getElementById('carsList');
        list.innerHTML = '';

        cars.forEach(car => {
            const row = document.createElement('div');
            row.className = 'car-row';
            row.id = `car-${car.id}`;

            const thumbHtml = car.imagePath
                ? `<img class="car-thumb" src="/uploads/${car.imagePath}" alt="${car.brand}"
               onerror="this.outerHTML='<div class=\\'car-thumb-placeholder\\'>🚗</div>'">`
                : `<div class="car-thumb-placeholder">🚗</div>`;

            const sellerName = car.seller?.name || car.sellerName || 'Unknown seller';

            row.innerHTML = `
          ${thumbHtml}
          <div class="car-info">
            <div class="car-name">${car.brand} ${car.model}</div>
            <div class="car-meta">${car.year} · ${Number(car.mileage).toLocaleString()} km · Rs. ${Number(car.price).toLocaleString()}</div>
            <div class="car-seller">Seller: ${sellerName}</div>
          </div>
          <button class="del-btn" onclick="askDelete('car', ${car.id}, '${car.brand} ${car.model}')">
            Delete
          </button>
        `;

            list.appendChild(row);
        });
    }

    async function loadSellers() {
        try {
            const res = await fetch('/api/admin/sellers', { credentials: 'include' });
            if (!res.ok) throw new Error();

            const sellers = await res.json();
            document.getElementById('sellersLoading').style.display = 'none';
            document.getElementById('statSellers').textContent = sellers.length;

            if (sellers.length === 0) {
                document.getElementById('sellersEmpty').style.display = 'block';
                return;
            }

            renderSellers(sellers);

        } catch (err) {
            document.getElementById('sellersLoading').style.display = 'none';
            showToast('Could not load sellers.', 'error');
        }
    }

    function renderSellers(sellers) {
        const list = document.getElementById('sellersList');
        list.innerHTML = '';

        sellers.forEach(seller => {
            const row = document.createElement('div');
            row.className = 'seller-row';
            row.id = `seller-${seller.id}`;

            const initials = seller.name
                ? seller.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2)
                : '??';

            const carCount = seller.carCount || 0;

            row.innerHTML = `
          <div class="seller-avatar">${initials}</div>
          <div class="seller-info">
            <div class="seller-name">${seller.name}</div>
            <div class="seller-email">${seller.email}</div>
            <div class="seller-count">${carCount} listing${carCount !== 1 ? 's' : ''}</div>
          </div>
          <button class="del-btn" onclick="askDelete('seller', ${seller.id}, '${seller.name}')">
            Remove
          </button>
        `;

            list.appendChild(row);
        });
    }

    function switchTab(name, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-${name}`).classList.add('active');
        btn.classList.add('active');
    }

    let pendingDelete = null;

    function askDelete(type, id, label) {
        pendingDelete = { type, id, label };

        document.getElementById('modalTitle').textContent =
            type === 'car' ? 'Delete Listing?' : 'Remove Seller?';

        document.getElementById('modalMessage').textContent =
            type === 'car'
                ? `Permanently delete "${label}"? This cannot be undone.`
                : `Remove seller "${label}" and all their listings? This cannot be undone.`;

        document.getElementById('confirmDeleteBtn').onclick = confirmDelete;
        document.getElementById('deleteModal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('deleteModal').classList.remove('show');
        pendingDelete = null;
    }

    async function confirmDelete() {
        if (!pendingDelete) return;
        const { type, id, label } = pendingDelete;
        closeModal();

        const url = type === 'car'
            ? `/api/admin/cars/${id}`
            : `/api/admin/sellers/${id}`;

        try {
            const res = await fetch(url, {
                method: 'DELETE',
                credentials: 'include'
            });

            if (res.ok) {
                const rowId = type === 'car' ? `car-${id}` : `seller-${id}`;
                const row = document.getElementById(rowId);
                if (row) row.remove();

                const statEl = type === 'car'
                    ? document.getElementById('statCars')
                    : document.getElementById('statSellers');
                statEl.textContent = Math.max(0, parseInt(statEl.textContent) - 1);

                showToast(
                    type === 'car' ? 'Listing deleted.' : 'Seller removed.',
                    'success'
                );

            } else {
                showToast(`Could not delete ${type}. Try again.`, 'error');
            }

        } catch (err) {
            showToast('Server error. Please try again.', 'error');
        }
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toastBar');
        toast.textContent = msg;
        toast.className = 'toast-bar ' + (type || 'error') + ' show';
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
</script>

</body>
</html>
