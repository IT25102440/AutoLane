<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/png" href="/icns/favicon.png"/>
    <title>AutoLane — Car Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <style>
        /* layout */
        .detail-wrap {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 2rem 4rem;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            align-items: start;
        }
        @media (max-width: 768px) { .detail-wrap { grid-template-columns: 1fr; } }

        /* image */
        .car-image-wrap {
            position: relative;
            overflow: hidden;
            background: var(--grey);
            aspect-ratio: 16/10;
        }
        .car-image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .car-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            color: var(--border);
        }

        /* info panel */
        .info-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            position: sticky;
            top: 90px;
        }
        .car-brand-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .car-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.8rem;
            line-height: 1;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .car-year { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .car-price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            color: var(--accent);
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        /* specs */
        .spec-list { margin-bottom: 1.5rem; }
        .spec-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .spec-row:last-child { border-bottom: none; }
        .spec-label { color: var(--muted); text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .spec-value { font-weight: 500; color: var(--white); }

        /* seller box */
        .seller-box { background: var(--grey); padding: 1rem; margin-bottom: 1.5rem; }
        .seller-box .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 0.3rem; }
        .seller-box .name { font-weight: 600; font-size: 1rem; }

        /* state override */
        .state-wrap { padding: 6rem 2rem; }

        /* cta button */
        .cta-btn {
            display: block;
            width: 100%;
            background: var(--accent);
            color: var(--black);
            border: none;
            padding: 1rem;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .cta-btn:hover { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    </style>
</head>
<body>

<div id="navbar-root" data-mode="public"></div>

<a href="/" class="back-link">← Back to listings</a>

<div id="loadingState" class="state-wrap">
    <span class="state-icon">⏳</span>
    <p>Loading car details...</p>
</div>

<div id="errorState" class="state-wrap" style="display:none;">
    <span class="state-icon">🚫</span>
    <p>Car not found or has been removed.</p>
    <a href="/" style="color: var(--accent); margin-top: 1rem; display:inline-block;">← Back to listings</a>
</div>

<div class="detail-wrap" id="detailWrap" style="display:none;">

    <div>
        <div class="car-image-wrap" id="imageWrap">
            <div class="car-image-placeholder">🚗</div>
        </div>
    </div>

    <div class="info-panel">
        <div class="car-brand-tag" id="carBrand"></div>
        <div class="car-title" id="carTitle"></div>
        <div class="car-year" id="carYear"></div>
        <div class="car-price" id="carPrice"></div>

        <div class="spec-list">
            <div class="spec-row">
                <span class="spec-label">Mileage</span>
                <span class="spec-value" id="carMileage"></span>
            </div>
            <div class="spec-row">
                <span class="spec-label">Location</span>
                <span class="spec-value" id="carLocation"></span>
            </div>
            <div class="spec-row">
                <span class="spec-label">Year</span>
                <span class="spec-value" id="carYearSpec"></span>
            </div>
        </div>

        <div class="seller-box">
            <div class="label">Listed by</div>
            <div class="name" id="sellerName"></div>
        </div>

        <button class="cta-btn" onclick="handleContact()">
            Contact Seller →
        </button>
    </div>

</div>

<div class="toast-bar" id="toastBar"></div>

<footer>
    <p>© 2026 AutoLane | WD.08.1.149</p>
</footer>

<script src="/js/auth.js"></script>
<script src="/js/navbar.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (!id) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            return;
        }

        loadCar(id);
    });

    async function loadCar(id) {
        try {
            const res = await fetch(`/api/cars/${id}`, { credentials: 'include' });

            if (!res.ok) {
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
                return;
            }

            const car = await res.json();
            renderCar(car);

        } catch (err) {
            document.getElementById('loadingState').style.display = 'none';
            showToast('Could not load car details. Is the backend running?');
        }
    }

    function renderCar(car) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('detailWrap').style.display = 'grid';

        document.title = `AutoLane — ${car.brand} ${car.model}`;

        document.getElementById('carBrand').textContent = car.brand;
        document.getElementById('carTitle').textContent = `${car.brand} ${car.model}`;
        document.getElementById('carYear').textContent = `${car.year} · ${car.location || 'Location not specified'}`;
        document.getElementById('carPrice').textContent = `Rs. ${Number(car.price).toLocaleString('en-US')}`;
        document.getElementById('carMileage').textContent = `${Number(car.mileage).toLocaleString('en-US')} km`;
        document.getElementById('carLocation').textContent = car.location || 'Not specified';
        document.getElementById('carYearSpec').textContent = car.year;

        // seller is nested inside the car response
        if (car.seller && car.seller.name) {
            document.getElementById('sellerName').textContent = car.seller.name;
        } else if (car.sellerName) {
            document.getElementById('sellerName').textContent = car.sellerName;
        } else {
            document.getElementById('sellerName').textContent = 'Unknown seller';
        }

        if (car.imagePath) {
            document.getElementById('imageWrap').innerHTML =
                `<img src="/uploads/${car.imagePath}" alt="${car.brand} ${car.model}"
                onerror="this.parentElement.innerHTML='<div class=\\'car-image-placeholder\\'>🚗</div>'" />`;
        }
    }

    function handleContact() {
        showToast('Feature coming soon — contact your seller directly.');
    }

    function showToast(msg) {
        const toast = document.getElementById('toastBar');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);
    }
</script>

</body>
</html>
